<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OLLAMA // TERMINAL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #080a0e;
    --bg2: #0d1117;
    --bg3: #111820;
    --line: #1e3a4a;
    --line-bright: #2a5570;
    --accent: #00d4ff;
    --accent2: #00ff9d;
    --accent3: #ff6b35;
    --text: #c8dde8;
    --text-dim: #4a7a8a;
    --text-bright: #e8f4f8;
    --user-bg: #0a1a24;
    --assistant-bg: #080f14;
    --danger: #ff3366;
    --grid-size: 40px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: var(--grid-size) var(--grid-size);
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.05) 2px,
      rgba(0,0,0,0.05) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    grid-template-rows: 56px 1fr;
    height: 100vh;
    position: relative;
    z-index: 2;
  }

  /* ── HEADER ── */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    padding: 0 24px;
    border-bottom: 1px solid var(--line-bright);
    background: var(--bg2);
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    animation: scanH 4s linear infinite;
  }

  @keyframes scanH {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,212,255,0.5);
    margin-right: 16px;
  }

  .logo-slash {
    color: var(--text-dim);
    font-weight: 300;
    font-size: 14px;
    letter-spacing: 2px;
    margin-right: auto;
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
    animation: pulse 2s ease-in-out infinite;
  }

  .status-dot.offline { background: var(--danger); box-shadow: 0 0 8px var(--danger); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .status-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--bg2);
    border-right: 1px solid var(--line-bright);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .sidebar::before {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(180deg, transparent, var(--accent), transparent);
    animation: scanV 6s linear infinite;
  }

  @keyframes scanV {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
  }

  .sidebar-section {
    padding: 16px;
    border-bottom: 1px solid var(--line);
  }

  .sidebar-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 3px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  /* Model selector */
  .model-select-wrapper {
    position: relative;
  }

  .model-select-wrapper::before {
    content: '▸';
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 10px;
    pointer-events: none;
  }

  select {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--line-bright);
    color: var(--text-bright);
    padding: 8px 10px 8px 24px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    appearance: none;
    cursor: pointer;
    outline: none;
    letter-spacing: 1px;
    transition: border-color 0.2s;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  }

  select:focus { border-color: var(--accent); }
  select option { background: var(--bg3); }

  /* URL input */
  .url-input-wrapper {
    position: relative;
    margin-bottom: 8px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--line-bright);
    color: var(--text-bright);
    padding: 7px 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    outline: none;
    letter-spacing: 1px;
    transition: border-color 0.2s;
    clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
  }

  input[type="text"]:focus { border-color: var(--accent); }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    padding: 8px;
    background: transparent;
    border: 1px solid var(--line-bright);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,255,0.05);
    box-shadow: inset 0 0 20px rgba(0,212,255,0.05);
  }

  .btn-accent {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .btn-accent:hover {
    background: rgba(0,255,157,0.05);
    box-shadow: inset 0 0 20px rgba(0,255,157,0.05), 0 0 10px rgba(0,255,157,0.2);
  }

  .btn-danger {
    border-color: var(--danger);
    color: var(--danger);
  }

  .btn-danger:hover {
    background: rgba(255,51,102,0.05);
  }

  /* Conversations */
  .conversations {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .conversations::-webkit-scrollbar { width: 3px; }
  .conversations::-webkit-scrollbar-track { background: transparent; }
  .conversations::-webkit-scrollbar-thumb { background: var(--line-bright); }

  .conv-item {
    padding: 10px 12px;
    cursor: pointer;
    border: 1px solid transparent;
    margin-bottom: 4px;
    position: relative;
    transition: all 0.2s;
    clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 0 100%);
  }

  .conv-item:hover {
    border-color: var(--line-bright);
    background: rgba(0,212,255,0.03);
  }

  .conv-item.active {
    border-color: var(--accent);
    background: rgba(0,212,255,0.05);
  }

  .conv-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  .conv-title {
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.5px;
  }

  .conv-meta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 3px;
  }

  .conv-delete {
    position: absolute;
    right: 8px; top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s;
    padding: 2px 4px;
  }

  .conv-item:hover .conv-delete { opacity: 1; }
  .conv-delete:hover { color: var(--danger); }

  /* ── MAIN ── */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 3px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--line-bright); }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 20px;
    opacity: 0.4;
  }

  .empty-geo {
    position: relative;
    width: 120px;
    height: 120px;
  }

  .empty-geo svg {
    width: 100%;
    height: 100%;
    animation: rotateSlow 20s linear infinite;
  }

  @keyframes rotateSlow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .empty-text {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* Messages */
  .message {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    animation: fadeInUp 0.3s ease;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message-avatar {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
    position: relative;
    margin-top: 4px;
  }

  .message-avatar svg {
    width: 100%;
    height: 100%;
  }

  .message-content {
    flex: 1;
    min-width: 0;
  }

  .message-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .message-role {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .role-user { color: var(--accent3); }
  .role-assistant { color: var(--accent); }

  .message-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }

  .message-body {
    background: var(--bg2);
    border: 1px solid var(--line);
    padding: 14px 16px;
    line-height: 1.7;
    font-size: 14px;
    color: var(--text-bright);
    position: relative;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
  }

  .message.user .message-body {
    background: var(--user-bg);
    border-color: rgba(255,107,53,0.3);
    clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
  }

  .message.assistant .message-body {
    border-color: rgba(0,212,255,0.2);
  }

  /* Thinking block */
  .thinking-block {
    background: rgba(0,255,157,0.03);
    border: 1px solid rgba(0,255,157,0.15);
    border-left: 2px solid var(--accent2);
    padding: 10px 14px;
    margin-bottom: 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: rgba(0,255,157,0.5);
    line-height: 1.6;
    clip-path: none;
    max-height: 120px;
    overflow-y: auto;
  }

  .thinking-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--accent2);
    margin-bottom: 6px;
    opacity: 0.7;
  }

  /* Cursor */
  .cursor {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: var(--accent);
    animation: blink 1s step-end infinite;
    vertical-align: middle;
    margin-left: 2px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Code blocks */
  .message-body pre {
    background: var(--bg);
    border: 1px solid var(--line-bright);
    padding: 12px;
    margin: 10px 0;
    overflow-x: auto;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    line-height: 1.5;
  }

  .message-body code {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--accent2);
    background: rgba(0,255,157,0.05);
    padding: 1px 4px;
  }

  .message-body pre code {
    background: none;
    padding: 0;
    color: var(--text);
  }

  /* ── INPUT AREA ── */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--line-bright);
    background: var(--bg2);
    position: relative;
  }

  .input-area::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), var(--accent), transparent);
    opacity: 0.5;
  }

  .input-wrapper {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-box {
    flex: 1;
    position: relative;
  }

  .input-box::before {
    content: '>';
    position: absolute;
    left: 12px;
    bottom: 13px;
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    pointer-events: none;
    z-index: 1;
  }

  textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--line-bright);
    color: var(--text-bright);
    padding: 12px 12px 12px 28px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 400;
    resize: none;
    outline: none;
    line-height: 1.5;
    min-height: 48px;
    max-height: 160px;
    transition: border-color 0.2s;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    letter-spacing: 0.3px;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-dim); }

  .send-btn {
    width: 48px;
    height: 48px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
  }

  .send-btn:hover {
    background: rgba(0,212,255,0.1);
    box-shadow: 0 0 20px rgba(0,212,255,0.2);
  }

  .send-btn:disabled {
    border-color: var(--line-bright);
    color: var(--text-dim);
    cursor: not-allowed;
  }

  .send-btn svg { width: 18px; height: 18px; }

  .input-meta {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* Corner decorations */
  .corner-tl, .corner-br {
    position: fixed;
    width: 60px;
    height: 60px;
    pointer-events: none;
    z-index: 10;
    opacity: 0.3;
  }

  .corner-tl { top: 60px; left: 264px; }
  .corner-br { bottom: 0; right: 0; transform: rotate(180deg); }

  /* Endpoint history tags */
  .endpoint-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--bg3);
    border: 1px solid var(--line-bright);
    padding: 2px 6px 2px 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    clip-path: polygon(0 0, calc(100% - 4px) 0, 100% 4px, 100% 100%, 4px 100%, 0 calc(100% - 4px));
    max-width: 100%;
    overflow: hidden;
  }
  .endpoint-tag:hover { border-color: var(--accent); color: var(--accent); }
  .endpoint-tag.current { border-color: var(--accent2); color: var(--accent2); }
  .endpoint-tag-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px; }
  .endpoint-tag-del { opacity: 0.4; font-size: 12px; flex-shrink: 0; }
  .endpoint-tag:hover .endpoint-tag-del { opacity: 1; color: var(--danger); }

  /* Model tags */
  .model-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(0,212,255,0.05);
    border: 1px solid rgba(0,212,255,0.2);
    padding: 2px 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  /* Geo decorations in header */
  .header-geo {
    margin-left: 16px;
    opacity: 0.3;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 80px;
    right: 24px;
    background: var(--bg2);
    border: 1px solid var(--accent2);
    color: var(--accent2);
    padding: 10px 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    z-index: 100;
    animation: toastIn 0.3s ease;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Loading spinner */
  .loading-ring {
    width: 16px; height: 16px;
    border: 1px solid var(--line-bright);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <header>
    <div class="logo">OLLAMA</div>
    <div class="logo-slash">// NEURAL TERMINAL v1.0</div>
    <svg class="header-geo" width="80" height="30" viewBox="0 0 80 30">
      <polygon points="0,15 15,0 65,0 80,15 65,30 15,30" fill="none" stroke="#00d4ff" stroke-width="0.5"/>
      <polygon points="10,15 20,5 60,5 70,15 60,25 20,25" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
      <line x1="0" y1="15" x2="80" y2="15" stroke="#00d4ff" stroke-width="0.3" opacity="0.3"/>
    </svg>
    <div class="header-status">
      <div id="statusDot" class="status-dot offline"></div>
      <span id="statusText" class="status-text">DISCONNECTED</span>
      <div id="currentModelTag" class="model-tag" style="display:none">
        <span>◈</span><span id="currentModelName">—</span>
      </div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">// endpoint</div>
      <div class="url-input-wrapper" style="margin-bottom:4px">
        <input type="text" id="ollamaUrl" placeholder="http://host:11434" list="endpointHistory" autocomplete="off">
        <datalist id="endpointHistory"></datalist>
      </div>
      <div id="endpointTags" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;min-height:0"></div>
      <button class="btn" onclick="loadModels()">
        <span class="loading-ring" id="connectSpinner" style="display:none"></span>
        <span>◈ CONNECT</span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">// model</div>
      <div class="model-select-wrapper">
        <select id="modelSelect">
          <option value="">— connect first —</option>
        </select>
      </div>
    </div>

    <div class="sidebar-section" style="display:flex;gap:8px">
      <button class="btn btn-accent" style="flex:1" onclick="newConversation()">＋ NEW</button>
      <button class="btn btn-danger" style="flex:1" onclick="clearAll()">⌫ CLEAR</button>
    </div>

    <div class="sidebar-label" style="padding:12px 16px 4px">// sessions</div>
    <div class="conversations" id="conversationList"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="chat-area" id="chatArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-geo">
          <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="60,5 115,32.5 115,87.5 60,115 5,87.5 5,32.5" stroke="#1e3a4a" stroke-width="1"/>
            <polygon points="60,20 100,40 100,80 60,100 20,80 20,40" stroke="#2a5570" stroke-width="1"/>
            <polygon points="60,35 85,47.5 85,72.5 60,85 35,72.5 35,47.5" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
            <circle cx="60" cy="60" r="8" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
            <circle cx="60" cy="60" r="3" fill="#00d4ff" opacity="0.6"/>
            <line x1="60" y1="5" x2="60" y2="35" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
            <line x1="60" y1="85" x2="60" y2="115" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
            <line x1="5" y1="32.5" x2="35" y2="47.5" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
            <line x1="85" y1="72.5" x2="115" y2="87.5" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
          </svg>
        </div>
        <div class="empty-text">AWAITING INPUT</div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <div class="input-box">
          <textarea
            id="messageInput"
            placeholder="ENTER QUERY..."
            rows="1"
            onkeydown="handleKeydown(event)"
            oninput="autoResize(this)"
          ></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send [Enter]">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-meta">
        <span id="tokenCount">TOKENS: —</span>
        <span>ENTER TO SEND · SHIFT+ENTER FOR NEWLINE</span>
      </div>
    </div>
  </main>
</div>

<!-- Corner geo decs -->
<svg class="corner-tl" viewBox="0 0 60 60" fill="none">
  <polyline points="0,30 0,0 30,0" stroke="#00d4ff" stroke-width="1"/>
  <polyline points="10,30 10,10 30,10" stroke="#00d4ff" stroke-width="0.5"/>
</svg>
<svg class="corner-br" viewBox="0 0 60 60" fill="none">
  <polyline points="0,30 0,0 30,0" stroke="#00d4ff" stroke-width="1"/>
  <polyline points="10,30 10,10 30,10" stroke="#00d4ff" stroke-width="0.5"/>
</svg>

<script>
  // ── STATE ──
  let conversations = JSON.parse(localStorage.getItem('ollama_convs') || '[]');
  let activeConvId = null;
  let isStreaming = false;

  function saveConversations() {
    localStorage.setItem('ollama_convs', JSON.stringify(conversations));
  }

  function getActiveConv() {
    return conversations.find(c => c.id === activeConvId);
  }

  // ── ENDPOINT HISTORY ──
  const MAX_ENDPOINTS = 8;

  function getEndpointHistory() {
    return JSON.parse(localStorage.getItem('ollama_endpoints') || '[]');
  }

  function saveEndpointHistory(list) {
    localStorage.setItem('ollama_endpoints', JSON.stringify(list));
  }

  function addEndpointToHistory(url) {
    let list = getEndpointHistory();
    list = list.filter(e => e !== url);
    list.unshift(url);
    if (list.length > MAX_ENDPOINTS) list = list.slice(0, MAX_ENDPOINTS);
    saveEndpointHistory(list);
  }

  function removeEndpointFromHistory(url) {
    let list = getEndpointHistory().filter(e => e !== url);
    saveEndpointHistory(list);
    // if we removed the last-used one, clear it
    if (localStorage.getItem('ollama_last_endpoint') === url) {
      localStorage.removeItem('ollama_last_endpoint');
    }
    renderEndpointTags();
  }

  function renderEndpointTags() {
    const list = getEndpointHistory();
    const current = document.getElementById('ollamaUrl').value.trim();
    const datalist = document.getElementById('endpointHistory');
    const container = document.getElementById('endpointTags');

    // Update datalist for native autocomplete
    datalist.innerHTML = list.map(e => `<option value="${escapeHtml(e)}">`).join('');

    if (!list.length) {
      container.style.minHeight = '0';
      container.innerHTML = '';
      return;
    }

    container.style.minHeight = 'auto';
    container.innerHTML = list.map(url => `
      <div class="endpoint-tag ${url === current ? 'current' : ''}" onclick="selectEndpoint('${escapeHtml(url)}')">
        <span class="endpoint-tag-text">${escapeHtml(url.replace('http://', '').replace('https://', ''))}</span>
        <span class="endpoint-tag-del" onclick="event.stopPropagation();removeEndpointFromHistory('${escapeHtml(url)}')">×</span>
      </div>
    `).join('');
  }

  function selectEndpoint(url) {
    document.getElementById('ollamaUrl').value = url;
    renderEndpointTags();
    loadModels();
  }

  // ── CONNECT & MODELS ──
  async function loadModels() {
    const url = document.getElementById('ollamaUrl').value.trim();
    if (!url) { showToast('✕ Enter an endpoint', true); return; }
    const spinner = document.getElementById('connectSpinner');
    spinner.style.display = 'inline-block';

    try {
      const res = await fetch(`${url}/api/tags`);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const models = data.models || [];

      const sel = document.getElementById('modelSelect');
      sel.innerHTML = models.length
        ? models.map(m => `<option value="${m.name}">${m.name}</option>`).join('')
        : '<option value="">No models found</option>';

      // Restore last used model for this endpoint
      const lastModel = localStorage.getItem(`ollama_model_${url}`);
      if (lastModel && models.find(m => m.name === lastModel)) {
        sel.value = lastModel;
      }

      setStatus(true, `${models.length} MODELS`);
      showToast(`◈ ${models.length} models loaded`);

      // Persist endpoint
      addEndpointToHistory(url);
      localStorage.setItem('ollama_last_endpoint', url);
      renderEndpointTags();

      if (models.length) updateModelTag(sel.value);
      sel.onchange = () => {
        updateModelTag(sel.value);
        localStorage.setItem(`ollama_model_${url}`, sel.value);
      };

    } catch (e) {
      setStatus(false, 'DISCONNECTED');
      showToast('✕ Connection failed', true);
    } finally {
      spinner.style.display = 'none';
    }
  }

  function setStatus(online, text) {
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    dot.className = 'status-dot' + (online ? '' : ' offline');
    txt.textContent = text;
  }

  function updateModelTag(model) {
    const tag = document.getElementById('currentModelTag');
    const name = document.getElementById('currentModelName');
    if (model) {
      tag.style.display = 'inline-flex';
      name.textContent = model;
    }
  }

  // ── CONVERSATIONS ──
  function newConversation() {
    const conv = {
      id: Date.now().toString(),
      title: 'NEW SESSION',
      messages: [],
      createdAt: new Date().toISOString()
    };
    conversations.unshift(conv);
    saveConversations();
    selectConversation(conv.id);
    renderConversationList();
  }

  function selectConversation(id) {
    activeConvId = id;
    renderConversationList();
    renderMessages();
  }

  function deleteConversation(id, e) {
    e.stopPropagation();
    conversations = conversations.filter(c => c.id !== id);
    if (activeConvId === id) {
      activeConvId = conversations[0]?.id || null;
    }
    saveConversations();
    renderConversationList();
    renderMessages();
  }

  function clearAll() {
    if (!confirm('Clear all sessions?')) return;
    conversations = [];
    activeConvId = null;
    saveConversations();
    renderConversationList();
    renderMessages();
  }

  function renderConversationList() {
    const list = document.getElementById('conversationList');
    if (!conversations.length) {
      list.innerHTML = '<div style="padding:12px;font-family:\'Share Tech Mono\',monospace;font-size:10px;color:var(--text-dim);letter-spacing:2px;text-align:center">NO SESSIONS</div>';
      return;
    }
    list.innerHTML = conversations.map(conv => `
      <div class="conv-item ${conv.id === activeConvId ? 'active' : ''}" onclick="selectConversation('${conv.id}')">
        <button class="conv-delete" onclick="deleteConversation('${conv.id}', event)">×</button>
        <div class="conv-title">${escapeHtml(conv.title)}</div>
        <div class="conv-meta">${conv.messages.length} MSG · ${formatDate(conv.createdAt)}</div>
      </div>
    `).join('');
  }

  // ── MESSAGES ──
  function renderMessages() {
    const area = document.getElementById('chatArea');
    const conv = getActiveConv();

    if (!conv || !conv.messages.length) {
      area.innerHTML = `
        <div class="empty-state" id="emptyState">
          <div class="empty-geo">
            <svg viewBox="0 0 120 120" fill="none">
              <polygon points="60,5 115,32.5 115,87.5 60,115 5,87.5 5,32.5" stroke="#1e3a4a" stroke-width="1"/>
              <polygon points="60,20 100,40 100,80 60,100 20,80 20,40" stroke="#2a5570" stroke-width="1"/>
              <polygon points="60,35 85,47.5 85,72.5 60,85 35,72.5 35,47.5" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
              <circle cx="60" cy="60" r="8" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
              <circle cx="60" cy="60" r="3" fill="#00d4ff" opacity="0.6"/>
            </svg>
          </div>
          <div class="empty-text">AWAITING INPUT</div>
        </div>`;
      return;
    }

    area.innerHTML = conv.messages.map(msg => renderMessage(msg)).join('');
    area.scrollTop = area.scrollHeight;
  }

  function renderMessage(msg) {
    const isUser = msg.role === 'user';
    const avatar = isUser ? userAvatar() : assistantAvatar();
    const thinking = msg.thinking ? `
      <div class="thinking-block">
        <div class="thinking-label">// CHAIN OF THOUGHT</div>
        ${escapeHtml(msg.thinking)}
      </div>` : '';

    return `
      <div class="message ${msg.role}">
        <div class="message-avatar">${avatar}</div>
        <div class="message-content">
          <div class="message-header">
            <span class="message-role role-${msg.role}">${isUser ? 'USER' : 'ASSISTANT'}</span>
            <span class="message-time">${formatTime(msg.time)}</span>
          </div>
          ${thinking}
          <div class="message-body">${formatContent(msg.content)}</div>
        </div>
      </div>`;
  }

  function userAvatar() {
    return `<svg viewBox="0 0 32 32" fill="none">
      <polygon points="16,2 30,9 30,23 16,30 2,23 2,9" stroke="#ff6b35" stroke-width="1" fill="rgba(255,107,53,0.05)"/>
      <polygon points="16,8 24,12 24,20 16,24 8,20 8,12" stroke="#ff6b35" stroke-width="0.5" opacity="0.5"/>
      <circle cx="16" cy="16" r="3" fill="#ff6b35" opacity="0.8"/>
    </svg>`;
  }

  function assistantAvatar() {
    return `<svg viewBox="0 0 32 32" fill="none">
      <rect x="2" y="2" width="28" height="28" stroke="#00d4ff" stroke-width="1" fill="rgba(0,212,255,0.05)"/>
      <rect x="7" y="7" width="18" height="18" stroke="#00d4ff" stroke-width="0.5" opacity="0.5"/>
      <circle cx="16" cy="16" r="4" stroke="#00d4ff" stroke-width="1"/>
      <circle cx="16" cy="16" r="1.5" fill="#00d4ff" opacity="0.8"/>
    </svg>`;
  }

  // ── SEND ──
  async function sendMessage() {
    if (isStreaming) return;
    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text) return;

    const model = document.getElementById('modelSelect').value;
    if (!model) { showToast('✕ Select a model first', true); return; }

    if (!activeConvId) newConversation();

    const conv = getActiveConv();
    const userMsg = { role: 'user', content: text, time: new Date().toISOString() };
    conv.messages.push(userMsg);

    if (conv.title === 'NEW SESSION') {
      conv.title = text.slice(0, 40) + (text.length > 40 ? '…' : '');
    }

    saveConversations();
    input.value = '';
    input.style.height = '48px';
    renderConversationList();
    renderMessages();

    // Add streaming placeholder
    const assistantMsg = { role: 'assistant', content: '', thinking: '', time: new Date().toISOString() };
    conv.messages.push(assistantMsg);
    renderMessages();

    isStreaming = true;
    document.getElementById('sendBtn').disabled = true;

    const url = document.getElementById('ollamaUrl').value.trim();

    try {
      const res = await fetch(`${url}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model,
          messages: conv.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content })),
          stream: true
        })
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let fullContent = '';
      let fullThinking = '';

      // Update last message live
      const updateLive = () => {
        const last = conv.messages[conv.messages.length - 1];
        last.content = fullContent;
        last.thinking = fullThinking;
        const area = document.getElementById('chatArea');
        const msgs = area.querySelectorAll('.message');
        const lastMsg = msgs[msgs.length - 1];
        if (lastMsg) {
          const body = lastMsg.querySelector('.message-body');
          if (body) body.innerHTML = formatContent(fullContent) + '<span class="cursor"></span>';

          const thinkingEl = lastMsg.querySelector('.thinking-block');
          if (fullThinking) {
            if (thinkingEl) {
              thinkingEl.innerHTML = `<div class="thinking-label">// CHAIN OF THOUGHT</div>${escapeHtml(fullThinking)}`;
            } else {
              const content = lastMsg.querySelector('.message-content');
              const newThink = document.createElement('div');
              newThink.className = 'thinking-block';
              newThink.innerHTML = `<div class="thinking-label">// CHAIN OF THOUGHT</div>${escapeHtml(fullThinking)}`;
              body.parentNode.insertBefore(newThink, body);
            }
          }
        }
        area.scrollTop = area.scrollHeight;
        document.getElementById('tokenCount').textContent = `TOKENS: ~${Math.ceil(fullContent.length / 4)}`;
      };

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        const lines = chunk.split('\n').filter(l => l.trim());
        for (const line of lines) {
          try {
            const data = JSON.parse(line);
            if (data.message?.content) fullContent += data.message.content;
            if (data.message?.thinking) fullThinking += data.message.thinking;
            updateLive();
          } catch {}
        }
      }

      // Finalize
      const last = conv.messages[conv.messages.length - 1];
      last.content = fullContent;
      last.thinking = fullThinking;
      saveConversations();
      renderMessages();
      renderConversationList();

    } catch (e) {
      const last = conv.messages[conv.messages.length - 1];
      last.content = '✕ ERROR: ' + e.message;
      saveConversations();
      renderMessages();
      showToast('✕ Stream error', true);
    } finally {
      isStreaming = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('tokenCount').textContent = 'TOKENS: —';
    }
  }

  // ── UTILS ──
  function handleKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function formatContent(text) {
    if (!text) return '';
    return escapeHtml(text)
      .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
  }

  function formatTime(iso) {
    return new Date(iso).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  }

  let toastTimer;
  function showToast(msg, isError = false) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    clearTimeout(toastTimer);
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.borderColor = isError ? 'var(--danger)' : 'var(--accent2)';
    toast.style.color = isError ? 'var(--danger)' : 'var(--accent2)';
    toast.textContent = msg;
    document.body.appendChild(toast);
    toastTimer = setTimeout(() => toast.remove(), 3000);
  }

  // ── INIT ──
  renderConversationList();
  renderMessages();

  // Restore last endpoint
  const lastEndpoint = localStorage.getItem('ollama_last_endpoint') || 'http://localhost:11434';
  document.getElementById('ollamaUrl').value = lastEndpoint;
  renderEndpointTags();

  // Auto-connect to last endpoint
  loadModels();
</script>
</body>
</html>
